<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
	<title>SASA</title>

	<style>
		:root {
			--bg: #07070c;
			--card: #141420;
			--muted: #8a8aa3;
			--text: #f5f5f7;
			--accent: #6c7cff;
			--border: #23233a;
		}

		body {
			margin: 0;
			font-family: system-ui, -apple-system, sans-serif;
			background: var(--bg);
			color: var(--text);
			display: flex;
			justify-content: center;
			overflow-x: hidden;
		}

		#stars {
			position: fixed;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			z-index: 0;
		}

		.container {
			position: relative;
			z-index: 1;
			width: 100%;
			max-width: 520px;
			padding: 18px;
			box-sizing: border-box;
			min-height: 100vh;
		}

		header {
			text-align: center;
			margin: 18px 0;
		}

		h1 {
			margin: 0;
			font-size: 20px;
			letter-spacing: 0.5px;
		}

		.sub {
			font-size: 12px;
			color: var(--muted);
			margin-top: 6px;
		}

		textarea {
			width: 100%;
			height: 70px;
			border-radius: 12px;
			border: 1px solid var(--border);
			padding: 10px;
			background: rgba(20,20,32,0.7);
			backdrop-filter: blur(6px);
			color: var(--text);
			font-size: 13px;
			outline: none;
			box-sizing: border-box;
		}

		button {
			width: 100%;
			margin-top: 10px;
			padding: 11px;
			border: none;
			border-radius: 12px;
			background: var(--accent);
			color: white;
			font-size: 13px;
		}

		button:active {
			transform: scale(0.98);
		}

		.section {
			margin-top: 18px;
		}

		.section-title {
			font-size: 11px;
			color: var(--muted);
			margin-bottom: 8px;
			letter-spacing: 1px;
			text-transform: uppercase;
		}

		.card {
			background: rgba(20,20,32,0.85);
			border: 1px solid var(--border);
			border-radius: 12px;
			padding: 10px;
			margin-bottom: 10px;
			backdrop-filter: blur(6px);
		}

		.text {
			font-size: 13px;
			line-height: 1.4;
		}

		.meta {
			margin-top: 8px;
			display: flex;
			justify-content: space-between;
			font-size: 11px;
			color: var(--muted);
		}

		.actions {
			margin-top: 8px;
			display: flex;
			gap: 8px;
		}

		.small-btn {
			flex: 1;
			font-size: 11px;
			padding: 8px;
			border-radius: 10px;
			border: 1px solid var(--border);
			background: transparent;
			color: var(--muted);
			text-align: center;
		}

		.small-btn:active {
			transform: scale(0.98);
		}

		.empty {
			text-align: center;
			color: var(--muted);
			font-size: 12px;
			padding: 14px;
			border: 1px dashed var(--border);
			border-radius: 12px;
		}
	</style>
</head>

<body>
<canvas id="stars"></canvas>

<div class="container">

	<header>
		<h1>SASA</h1>
		<div class="sub">Turn problems into tools</div>
	</header>

	<textarea id="input" placeholder="What should be built?"></textarea>
	<button onclick="submitRequest()">Submit</button>

	<div class="section">
		<div class="section-title">Live requests</div>
		<div id="feed"></div>
	</div>

</div>

<script>
/* -----------------------------
	STORAGE
----------------------------- */

function getStore() {
	return JSON.parse(localStorage.getItem("sasa") || "[]");
}

function setStore(v) {
	localStorage.setItem("sasa", JSON.stringify(v));
}

/* -----------------------------
	ANTI-SPAM / DUPLICATES
----------------------------- */

function normalize(text) {
	return text.toLowerCase().replace(/\s+/g, " ").trim();
}

function isDuplicate(text, data) {
	const n = normalize(text);
	return data.some(x => normalize(x.text) === n);
}

function isSpam(text) {
	if (text.length < 6) return true;
	if (text.length > 200) return true;

	// repeated chars spam like "aaaaaa"
	if (/^(.)\1+$/.test(text)) return true;

	return false;
}

/* -----------------------------
	SUBMIT
----------------------------- */

function submitRequest() {
	const input = document.getElementById("input");
	const text = input.value.trim();
	if (!text) return;

	const data = getStore();

	if (isSpam(text)) return;

	if (isDuplicate(text, data)) {
		alert("Already submitted.");
		return;
	}

	data.push({
		text,
		upvotes: 0,
		time: Date.now()
	});

	setStore(data);
	input.value = "";
	render();
}

/* -----------------------------
	UPVOTE (basic anti-spam)
----------------------------- */

function canUpvote(id) {
	const key = "vote_" + id;
	const last = localStorage.getItem(key);
	if (!last) return true;

	// 1 vote per 2 minutes per item per device
	return Date.now() - parseInt(last) > 120000;
}

function upvote(index) {
	const data = getStore();
	if (!data[index]) return;

	if (!canUpvote(index)) return;

	data[index].upvotes = (data[index].upvotes || 0) + 1;
	setStore(data);

	localStorage.setItem("vote_" + index, Date.now().toString());
	render();
}

/* -----------------------------
	VIRAL SHARE
----------------------------- */

function share(text) {
	const url = location.href.split("?")[0];
	const shareText = `Build this idea:\n\n"${text}"\n\nJoin SASA: ${url}`;

	if (navigator.share) {
		navigator.share({
			title: "SASA Idea",
			text: shareText
		});
	} else {
		navigator.clipboard.writeText(shareText);
		alert("Copied to clipboard");
	}
}

/* -----------------------------
	RENDER
----------------------------- */

function render() {
	const feed = document.getElementById("feed");
	const data = getStore();

	feed.innerHTML = "";

	if (data.length === 0) {
		feed.innerHTML = `<div class="empty">No requests yet</div>`;
		return;
	}

	const sorted = [...data].reverse();

	sorted.forEach((item, i) => {
		const realIndex = data.length - 1 - i;

		const card = document.createElement("div");
		card.className = "card";

		card.innerHTML = `
			<div class="text">${item.text}</div>

			<div class="meta">
				<span>▲ ${item.upvotes || 0}</span>
				<span>${new Date(item.time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
			</div>

			<div class="actions">
				<button class="small-btn" onclick="upvote(${realIndex})">Upvote</button>
				<button class="small-btn" onclick="share(\`${item.text.replace(/`/g,'')}\`)">Share</button>
			</div>
		`;

		feed.appendChild(card);
	});
}

render();

/* -----------------------------
	STAR BACKGROUND (lightweight)
----------------------------- */

const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

let stars = [];

function resize() {
	canvas.width = window.innerWidth;
	canvas.height = window.innerHeight;

	stars = Array.from({ length: 80 }, () => ({
		x: Math.random() * canvas.width,
		y: Math.random() * canvas.height,
		r: Math.random() * 1.2,
		v: 0.1 + Math.random() * 0.3
	}));
}

function draw() {
	ctx.clearRect(0, 0, canvas.width, canvas.height);

	ctx.fillStyle = "white";

	for (let s of stars) {
		ctx.globalAlpha = 0.3;
		ctx.beginPath();
		ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
		ctx.fill();

		s.y += s.v;

		if (s.y > canvas.height) {
			s.y = 0;
			s.x = Math.random() * canvas.width;
		}
	}

	requestAnimationFrame(draw);
}

window.addEventListener("resize", resize);
resize();
draw();

</script>

</body>
</html>
