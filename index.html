<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
	<title>SASA</title>

	<style>
		:root {
			--bg: #07070c;
			--card: #141420;
			--muted: #8a8aa3;
			--text: #f5f5f7;
			--accent: #6c7cff;
			--border: #23233a;
		}

		body {
			margin: 0;
			font-family: system-ui, -apple-system, sans-serif;
			background: var(--bg);
			color: var(--text);
			display: flex;
			justify-content: center;
			overflow-x: hidden;
		}

		#stars {
			position: fixed;
			inset: 0;
			z-index: 0;
		}

		.container {
			position: relative;
			z-index: 1;
			width: 100%;
			max-width: 520px;
			padding: 18px;
			box-sizing: border-box;
			min-height: 100vh;
		}

		header {
			text-align: center;
			margin: 18px 0;
		}

		h1 {
			margin: 0;
			font-size: 20px;
		}

		.sub {
			font-size: 12px;
			color: var(--muted);
			margin-top: 6px;
		}

		textarea {
			width: 100%;
			height: 70px;
			border-radius: 12px;
			border: 1px solid var(--border);
			padding: 10px;
			background: rgba(20,20,32,0.7);
			color: var(--text);
			font-size: 13px;
			outline: none;
			box-sizing: border-box;
		}

		button {
			width: 100%;
			margin-top: 10px;
			padding: 11px;
			border: none;
			border-radius: 12px;
			background: var(--accent);
			color: white;
			font-size: 13px;
		}

		.section-title {
			font-size: 11px;
			color: var(--muted);
			margin: 14px 0 8px;
			text-transform: uppercase;
			letter-spacing: 1px;
		}

		.card {
			background: rgba(20,20,32,0.85);
			border: 1px solid var(--border);
			border-radius: 12px;
			padding: 10px;
			margin-bottom: 10px;
		}

		.text {
			font-size: 13px;
			line-height: 1.4;
		}

		.meta {
			margin-top: 8px;
			display: flex;
			justify-content: space-between;
			font-size: 11px;
			color: var(--muted);
		}

		.actions {
			margin-top: 8px;
			display: flex;
			gap: 8px;
		}

		.small-btn {
			flex: 1;
			font-size: 11px;
			padding: 8px;
			border-radius: 10px;
			border: 1px solid var(--border);
			background: transparent;
			color: var(--muted);
			text-align: center;
		}

		.small-btn:active {
			transform: scale(0.98);
		}

		.modal {
			position: fixed;
			inset: 0;
			background: rgba(0,0,0,0.65);
			display: none;
			align-items: center;
			justify-content: center;
			z-index: 10;
		}

		.modal-box {
			width: 90%;
			max-width: 320px;
			background: var(--card);
			border: 1px solid var(--border);
			border-radius: 14px;
			padding: 14px;
		}

		.modal input {
			width: 100%;
			padding: 10px;
			border-radius: 10px;
			border: 1px solid var(--border);
			background: #0f0f18;
			color: var(--text);
			font-size: 13px;
			box-sizing: border-box;
		}
	</style>
</head>

<body>
<canvas id="stars"></canvas>

<div class="container">

	<header>
		<h1>SASA</h1>
		<div class="sub">Turn problems into tools</div>
	</header>

	<textarea id="input" placeholder="What should be built?"></textarea>
	<button onclick="attemptSubmit()">Submit</button>

	<div class="section-title">Live requests</div>
	<div id="feed"></div>

</div>

<!-- EMAIL MODAL -->
<div class="modal" id="modal">
	<div class="modal-box">
		<div style="margin-bottom:10px;font-size:13px;">Enter email to submit</div>
		<input id="email" placeholder="you@email.com" />
		<button onclick="confirmSubmit()">Continue</button>
	</div>
</div>

<script>
/* ---------------- STORAGE ---------------- */

function getStore() {
	return JSON.parse(localStorage.getItem("sasa") || "[]");
}

function setStore(v) {
	localStorage.setItem("sasa", JSON.stringify(v));
}

/* ---------------- EMAIL LIMIT ---------------- */

function normalizeEmail(e) {
	return (e || "").toLowerCase().trim();
}

function emailUsed(email, data) {
	return data.some(x => x.email === email);
}

/* ---------------- SUBMIT FLOW ---------------- */

let pendingText = "";

function attemptSubmit() {
	const text = document.getElementById("input").value.trim();
	if (!text) return;

	pendingText = text;
	document.getElementById("modal").style.display = "flex";
}

function confirmSubmit() {
	const email = normalizeEmail(document.getElementById("email").value);
	if (!email || !email.includes("@")) return;

	const data = getStore();

	if (emailUsed(email, data)) {
		alert("This email already submitted an idea.");
		return;
	}

	data.push({
		text: pendingText,
		email,
		upvotes: 0,
		time: Date.now()
	});

	setStore(data);

	pendingText = "";
	document.getElementById("input").value = "";
	document.getElementById("email").value = "";
	document.getElementById("modal").style.display = "none";

	render();
}

/* ---------------- UPVOTE ---------------- */

function upvote(index) {
	const data = getStore();
	const key = "vote_" + index;

	if (localStorage.getItem(key)) return;

	data[index].upvotes = (data[index].upvotes || 0) + 1;
	setStore(data);

	localStorage.setItem(key, "1");
	render();
}

/* ---------------- X SHARE (CTR TRACKING) ---------------- */

function xShare(text) {
	const base = "https://twitter.com/intent/tweet";

	const msg =
		`${text}\n\nBuild this on SASA\n@unprincipledinc`;

	const url = base +
		"?text=" + encodeURIComponent(msg);

	// optional CTR hook (local tracking)
	const key = "share_" + text;
	localStorage.setItem(key, (parseInt(localStorage.getItem(key) || "0") + 1).toString());

	window.open(url, "_blank");
}

/* ---------------- RENDER ---------------- */

function render() {
	const feed = document.getElementById("feed");
	const data = getStore();

	feed.innerHTML = "";

	if (data.length === 0) {
		feed.innerHTML = `<div style="color:#8a8aa3;font-size:12px;">No requests yet</div>`;
		return;
	}

	const sorted = [...data].reverse();

	sorted.forEach((item, i) => {
		const realIndex = data.length - 1 - i;

		const div = document.createElement("div");
		div.className = "card";

		div.innerHTML = `
			<div class="text">${item.text}</div>

			<div class="meta">
				<span>▲ ${item.upvotes || 0}</span>
				<span>${item.email.split("@")[0]}</span>
			</div>

			<div class="actions">
				<button class="small-btn" onclick="upvote(${realIndex})">Upvote</button>
				<button class="small-btn" onclick="xShare(\`${item.text.replace(/`/g,'')}\`)">Share on X</button>
			</div>
		`;

		feed.appendChild(div);
	});
}

render();

/* ---------------- STARFIELD ---------------- */

const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

let stars = [];

function resize() {
	canvas.width = window.innerWidth;
	canvas.height = window.innerHeight;

	stars = Array.from({ length: 70 }, () => ({
		x: Math.random() * canvas.width,
		y: Math.random() * canvas.height,
		r: Math.random() * 1.2,
		v: 0.1 + Math.random() * 0.25
	}));
}

function draw() {
	ctx.clearRect(0, 0, canvas.width, canvas.height);
	ctx.fillStyle = "white";

	for (let s of stars) {
		ctx.globalAlpha = 0.25;
		ctx.beginPath();
		ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
		ctx.fill();

		s.y += s.v;

		if (s.y > canvas.height) {
			s.y = 0;
			s.x = Math.random() * canvas.width;
		}
	}

	requestAnimationFrame(draw);
}

window.addEventListener("resize", resize);
resize();
draw();

</script>

</body>
</html>
