<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SASA</title>

<style>
:root{
	--bg:#07070c;
	--card:#141420;
	--text:#f5f5f7;
	--muted:#8a8aa3;
	--border:#23233a;
}

body{
	margin:0;
	font-family:system-ui;
	background:var(--bg);
	color:var(--text);
	display:flex;
	justify-content:center;
	align-items:center;
	min-height:100vh;
}

.container{
	width:100%;
	max-width:420px;
	display:flex;
	flex-direction:column;
	align-items:center;
	gap:14px;
	padding:20px;
	text-align:center;
}

h1{
	margin:0;
	font-size:20px;
	letter-spacing:1px;
}

.sub{
	font-size:11px;
	color:var(--muted);
}

.card{
	width:100%;
	background:rgba(20,20,32,0.85);
	border:1px solid var(--border);
	border-radius:14px;
	padding:16px;
	cursor:pointer;
	transition:transform .1s ease;
}

.card:active{
	transform:scale(0.98);
}

.row{
	font-size:16px;
	margin-bottom:6px;
}

.label{
	font-size:13px;
	color:var(--text);
}

.sw{
	font-size:11px;
	color:var(--muted);
	margin-top:2px;
}

.footer{
	font-size:10px;
	color:var(--muted);
	margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

	<h1>SASA</h1>
	<div class="sub">chagua tatizo</div>

	<div class="card" onclick="go('money')">
		<div class="row">💸 Money</div>
		<div class="label">Pesa</div>
		<div class="sw">fedha / kipato</div>
	</div>

	<div class="card" onclick="go('time')">
		<div class="row">⏳ Time</div>
		<div class="label">Muda</div>
		<div class="sw">ucheleweshaji / kazi</div>
	</div>

	<div class="card" onclick="go('opportunity')">
		<div class="row">🚀 Opportunity</div>
		<div class="label">Fursa</div>
		<div class="sw">ujifunzaji / kazi / ukuaji</div>
	</div>

	<div class="footer">tap to continue</div>

</div>

<script>
function go(type){
	const routes = {
		money: "https://forms.gle/REPLACE",
		time: "https://forms.gle/REPLACE",
		opportunity: "https://forms.gle/REPLACE"
	};

	window.location.href = routes[type];
}
</script>

</body>
</html>
