<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
	<title>SASA</title>

	<style>
		:root {
			--bg: #0b0b10;
			--card: #151520;
			--muted: #8a8aa3;
			--text: #f5f5f7;
			--accent: #6c7cff;
			--border: #222235;
		}

		body {
			margin: 0;
			font-family: system-ui, -apple-system, sans-serif;
			background: var(--bg);
			color: var(--text);
			display: flex;
			justify-content: center;
		}

		.container {
			width: 100%;
			max-width: 520px;
			padding: 18px;
			min-height: 100vh;
			box-sizing: border-box;
		}

		header {
			text-align: center;
			margin-top: 20px;
			margin-bottom: 18px;
		}

		h1 {
			margin: 0;
			font-size: 20px;
			letter-spacing: 0.5px;
		}

		.sub {
			font-size: 12px;
			color: var(--muted);
			margin-top: 6px;
		}

		textarea {
			width: 100%;
			height: 70px;
			border-radius: 12px;
			border: 1px solid var(--border);
			padding: 10px;
			background: #111118;
			color: var(--text);
			font-size: 13px;
			outline: none;
			box-sizing: border-box;
		}

		button {
			width: 100%;
			margin-top: 10px;
			padding: 11px;
			border: none;
			border-radius: 12px;
			background: var(--accent);
			color: white;
			font-size: 13px;
			cursor: pointer;
		}

		button:active {
			transform: scale(0.98);
		}

		.section {
			margin-top: 18px;
		}

		.section-title {
			font-size: 11px;
			color: var(--muted);
			margin-bottom: 8px;
			letter-spacing: 1px;
			text-transform: uppercase;
		}

		.card {
			background: var(--card);
			border: 1px solid var(--border);
			border-radius: 12px;
			padding: 10px;
			margin-bottom: 10px;
			animation: fadeIn 0.2s ease-out;
		}

		@keyframes fadeIn {
			from { opacity: 0; transform: translateY(4px); }
			to { opacity: 1; transform: translateY(0); }
		}

		.text {
			font-size: 13px;
			line-height: 1.4;
		}

		.meta {
			margin-top: 8px;
			display: flex;
			justify-content: space-between;
			font-size: 11px;
			color: var(--muted);
		}

		.actions {
			margin-top: 8px;
			display: flex;
			gap: 8px;
		}

		.small-btn {
			flex: 1;
			font-size: 11px;
			padding: 8px;
			border-radius: 10px;
			border: 1px solid var(--border);
			background: transparent;
			color: var(--muted);
			text-align: center;
			text-decoration: none;
			display: inline-block;
		}

		.small-btn:active {
			transform: scale(0.98);
		}

		.empty {
			text-align: center;
			color: var(--muted);
			font-size: 12px;
			padding: 14px;
			border: 1px dashed var(--border);
			border-radius: 12px;
		}
	</style>
</head>

<body>
	<div class="container">

		<header>
			<h1>SASA</h1>
			<div class="sub">Problems Are Opportunities</div>
			<div class="sub">Matatizo ni Fursa</div>
		</header>

		<textarea id="input" placeholder="What do you want to create?"></textarea>
		<button onclick="submitRequest()">Submit</button>

		<div class="section">
			<div class="section-title">Live requests</div>
			<div id="feed"></div>
		</div>

	</div>

	<script>
		function getStore() {
			return JSON.parse(localStorage.getItem("sasa") || "[]");
		}

		function setStore(v) {
			localStorage.setItem("sasa", JSON.stringify(v));
		}

		function submitRequest() {
			const input = document.getElementById("input");
			const text = input.value.trim();
			if (!text) return;

			const data = getStore();

			data.push({
				text,
				upvotes: 0,
				time: Date.now()
			});

			setStore(data);
			input.value = "";
			render();
		}

		function upvote(index) {
			const data = getStore();
			if (!data[index]) return;

			data[index].upvotes = (data[index].upvotes || 0) + 1;
			setStore(data);
			render();
		}

		function buildLink(text) {
			return "https://github.com/new?title=" + encodeURIComponent("Build: " + text);
		}

		function render() {
			const feed = document.getElementById("feed");
			const data = getStore();

			feed.innerHTML = "";

			if (data.length === 0) {
				feed.innerHTML = `<div class="empty">No requests yet</div>`;
				return;
			}

			// newest first
			const sorted = [...data].reverse();

			sorted.forEach((item, i) => {
				const realIndex = data.length - 1 - i;

				const card = document.createElement("div");
				card.className = "card";

				card.innerHTML = `
					<div class="text">${item.text}</div>

					<div class="meta">
						<span>▲ ${item.upvotes || 0}</span>
						<span>${new Date(item.time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
					</div>

					<div class="actions">
						<button onclick="upvote(${realIndex})">Upvote</button>
						<a class="small-btn" href="${buildLink(item.text)}" target="_blank">
							Create Issue
						</a>
					</div>
				`;

				feed.appendChild(card);
			});
		}

		render();
	</script>

</body>
</html>
