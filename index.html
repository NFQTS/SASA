<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
	<title>SASA</title>
	<style>
		body {
			font-family: Arial, sans-serif;
			margin: 0;
			padding: 20px;
			background: #0f0f0f;
			color: #f0f0f0;
		}

		h1 {
			font-size: 20px;
			margin-bottom: 10px;
		}

		.container {
			max-width: 600px;
			margin: 0 auto;
		}

		textarea {
			width: 100%;
			height: 90px;
			padding: 10px;
			border-radius: 8px;
			border: none;
			outline: none;
			font-size: 14px;
		}

		button {
			margin-top: 10px;
			width: 100%;
			padding: 12px;
			border: none;
			border-radius: 8px;
			background: #4f7cff;
			color: white;
			font-size: 14px;
			cursor: pointer;
		}

		.card {
			background: #1a1a1a;
			padding: 10px;
			border-radius: 8px;
			margin-top: 10px;
			font-size: 13px;
		}

		.label {
			opacity: 0.6;
			font-size: 12px;
			margin-top: 20px;
		}

		.idea {
			padding: 8px;
			border-bottom: 1px solid #2a2a2a;
		}

		.small {
			opacity: 0.7;
			font-size: 12px;
		}
	</style>
</head>
<body>
	<div class="container">
		<h1>Request SASA</h1>
		<div class="small">Problems Are Opportunities</div>

		<textarea id="input" placeholder="What do you need help with?"></textarea>
		<button onclick="submitRequest()">Submit Request</button>

		<div class="label">Known ideas (examples)</div>
		<div id="ideas"></div>

		<div class="label">Live requests</div>
		<div id="requests"></div>
	</div>

	<script>
		const defaultIdeas = [
			"AI homework helper via WhatsApp",
			"Small business CRM bot",
			"Side-hustle generator assistant",
			"Study quiz generator",
			"Expense tracker via chat"
		];

		function load() {
			const ideasDiv = document.getElementById("ideas");
			const reqDiv = document.getElementById("requests");

			ideasDiv.innerHTML = "";
			reqDiv.innerHTML = "";

			defaultIdeas.forEach(i => {
				const d = document.createElement("div");
				d.className = "idea";
				d.textContent = i;
				ideasDiv.appendChild(d);
			});

			const stored = JSON.parse(localStorage.getItem("requests") || "[]");

			stored.slice().reverse().forEach(r => {
				const d = document.createElement("div");
				d.className = "idea";
				d.innerHTML = `<div>${r.text}</div><div class="small">${r.time}</div>`;
				reqDiv.appendChild(d);
			});
		}

		function submitRequest() {
			const input = document.getElementById("input");
			const text = input.value.trim();
			if (!text) return;

			const stored = JSON.parse(localStorage.getItem("requests") || "[]");

			stored.push({
				text,
				time: new Date().toLocaleString()
			});

			localStorage.setItem("requests", JSON.stringify(stored));

			input.value = "";
			load();
		}

		load();
	</script>
</body>
</html>
